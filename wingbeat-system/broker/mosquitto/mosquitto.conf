# Wing BEat — Mosquitto config
# Anonymous, LAN-only. Don't expose port 1883/9001 to the public internet.

persistence       true
persistence_location /mosquitto/data/
log_dest          stdout
log_type          error
log_type          warning
log_type          notice
log_type          information
allow_anonymous   true

# Native MQTT for ESP8266 nodes
listener 1883 0.0.0.0
protocol mqtt

# MQTT-over-WebSocket for the browser UI
listener 9001 0.0.0.0
protocol websockets
